name: Supabase keep-alive

on:
  schedule:
    - cron: "0 8 */4 * *"  # elke 4 dagen om 08:00 UTC
  workflow_dispatch:         # ook handmatig uitvoerbaar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ctbpkaalmvrkwggkgvwz.supabase.co/rest/v1/app_state?select=key&limit=1" \
            -H "apikey: sb_publishable_AxnIfT3l6DG1Pdvl2x-hLA_vBKMb1xe" \
            -H "Authorization: Bearer sb_publishable_AxnIfT3l6DG1Pdvl2x-hLA_vBKMb1xe")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Fout: Supabase antwoordde met status $STATUS"
            exit 1
          fi
          echo "Supabase is actief."
